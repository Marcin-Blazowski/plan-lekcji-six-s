<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Plan lekcji</title>
  <style>
    body { font-family: sans-serif; max-width: 900px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.4rem; color: #333; }
    .fetch-time { font-size: 0.85rem; color: #555; margin: 0.25rem 0 1.5rem; }
    h2 { font-size: 1.1rem; margin-top: 2rem; border-bottom: 2px solid #ccc; padding-bottom: 4px; }
    table { width: 100%; border-collapse: collapse; margin-top: 0.5rem; }
    th, td { text-align: left; padding: 6px 10px; border: 1px solid #ddd; font-size: 0.9rem; }
    th { background: #f5f5f5; }
    tr.canceled td { background: #fdecea; color: #b71c1c; text-decoration: line-through; }
    tr.substitution td { background: #fff8e1; color: #5d4037; }
    td.empty { color: #888; font-style: italic; }
    small { color: #888; }
  </style>
</head>
<body>
  <h1>Plan lekcji — dziś i jutro</h1>
  <p class="fetch-time">Dane pobrane z Librus Synergia: 13 czerwca 2026, godz. 13:32 (CEST)</p>
  
    <section>
      <h2>Sobota, 2026-06-13</h2>
      <table>
        <thead>
          <tr>
            <th>#</th><th>Godzina</th><th>Przedmiot</th><th>Nauczyciel</th><th>Sala</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="5" class="empty">Brak lekcji</td></tr>
        </tbody>
      </table>
    </section>
    <section>
      <h2>Niedziela, 2026-06-14</h2>
      <table>
        <thead>
          <tr>
            <th>#</th><th>Godzina</th><th>Przedmiot</th><th>Nauczyciel</th><th>Sala</th>
          </tr>
        </thead>
        <tbody>
          <tr><td colspan="5" class="empty">Brak lekcji</td></tr>
        </tbody>
      </table>
    </section>
</body>
</html>
